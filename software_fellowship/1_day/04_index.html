<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Fourth Website</title>

    <style>

.cards{
    width:250px;
    height: 100px;
    border: 2px solid black;
    background-color: white;
    border-radius: 10px;

}

.text{
    padding:0 0 0 10px;
}
    </style>
</head>
<body>
    <h1>Alfred Adler</h1>
    <div class="main-container">

        <div class="cards">
            <p><center>About Me</center></p>
            <p class="text">Random text</p>
        </div>
        <br>

        <button onclick="changeTitle()" ondblclick="changeTitleAgain()">
            Change Something man
        </button>
    </div>

<script>
    function changeTitle(){
        document.querySelector("h1").textContent= "Hello Javascript"
    }

    function changeTitleAgain(){
        document.querySelector("h1").textContent= "Alfred Adler"
    }
</script>
</body>
</html>
