<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .mydiv {
        border: 2px solid black;
        display: flex;
        justify-content: space-between; /* try changing justify content and align items*/
        align-items: center;
        height: 100vh;
      }
      .one {
        background-color: red;
        height: 100px;
        width: 100px;
      }

      .two {
        background-color: aqua;
        height: 100px;
        width: 100px;
      }

      .three {
        background-color: yellow;
        width: 100px;
        height: 100px;
      }
      .four {
        background-color: green;
        width: 100px;
        height: 100px;
      }
    </style>
  </head>
  <body>
    <div class="mydiv">
      <div class="one">one</div>
      <div class="two">two</div>
      <div class="three">three</div>
      <div class="four">four</div>
    </div>
  </body>
</html>
